server {
    listen 80;
    server_name hfp-coach.ch www.hfp-coach.ch;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hfp-coach.ch www.hfp-coach.ch;

    ssl_certificate     /etc/letsencrypt/live/hfp-coach.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hfp-coach.ch/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/iobsp-coach;
    index index.html;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.hfp-coach.ch; worker-src 'self';" always;

    # Cache long pour assets versionnés
    location ~* \.(png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour SW et manifest
    location ~* (sw\.js|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache court pour JS/CSS (SW gère le cache applicatif)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
